<div class="page-wrapper">
  <div class="custom-card">

    <div class="card-header">
      <div class="icon-circle">
        <mat-icon>edit</mat-icon>
      </div>
      <h3>Modifier l'Utilisateur</h3>
      <p>Mise à jour des informations</p>
    </div>
    <div class="card-body">
      <form>
        <div class="row">
          <div class="col-md-6 mb-3">
            <label>Prénom</label>
            <div class="input-box">
              <mat-icon>badge</mat-icon>
              <input type="text" [(ngModel)]="user.firstname" name="firstname" placeholder="Prénom" required>
            </div>
          </div>
          <div class="col-md-6 mb-3">
            <label>Nom</label>
            <div class="input-box">
              <mat-icon>badge</mat-icon>
              <input type="text" [(ngModel)]="user.lastname" name="lastname" placeholder="Nom" required>
            </div>
          </div>

          <div class="col-md-6 mb-3">
            <label>Téléphone</label>
            <div class="input-box">
              <mat-icon>phone</mat-icon>
              <input type="text" [(ngModel)]="user.tel" name="tel" placeholder="Téléphone" required>
            </div>
          </div>

          <div class="col-md-6 mb-3">
            <label>Date de naissance</label>
            <div class="input-box">
              <mat-icon>date_range</mat-icon>
              <input type="date" [(ngModel)]="user.dateN" name="dateN" required>
            </div>
          </div>
          <div class="col-md-6 mb-3">
            <label>genre</label>
            <div class="input-box">
              <mat-icon>person</mat-icon>
              <select [(ngModel)]="user.genre" name="genre" required>
                <option value="HOMME">HOMME</option>
                <option value="FEMME">FEMME</option>
              </select>
            </div>
          </div>

          <div class="col-md-6 mb-3">
            <label>Email</label>
            <div class="input-box">
              <mat-icon>email</mat-icon>
              <input type="email" [(ngModel)]="user.email" name="email" placeholder="Email" required>
            </div>
          </div>

          <div class="col-md-6 mb-3">
            <label>Rôle</label>
            <div class="input-box">
              <mat-icon>security</mat-icon>
              <select [(ngModel)]="user.role" name="role" required>
                <option value="EMPLOYE">Employé (User)</option>
                <option value="AGENT_ADMINISTRATIF">Agent Administratif</option>
              </select>
            </div>
          </div>
          <div class="col-md-6 mb-3">
            <label>Département</label>
            <div class="input-box">
              <mat-icon>business</mat-icon>
              <select [(ngModel)]="user.departement" name="departement" required>
                <option value="" disabled>Choisir un département</option>
                @for (dep of departements; track dep) {
                <option [value]="dep">{{ dep }}</option>
                }
              </select>
            </div>
          </div>

        </div>

        <div class="actions">
          <button type="button" class="btn-cancel" (click)="cancel()">Annuler</button>

          <button class="btn-save" type="button" (click)="updateUser(user)">
            <mat-icon>save</mat-icon> Enregistrer
          </button>
        </div>

      </form>
    </div>
  </div>
</div>
