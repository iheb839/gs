<h2>Modifier mot de passe</h2>

<form>
  <label for="oldPassword">Ancien mot de passe :</label><br>
  <input type="password" [(ngModel)]="oldPassword" name="oldPassword" id="oldPassword"><br><br>

  <label for="newPassword">Nouveau mot de passe :</label><br>
  <input type="password" [(ngModel)]="newPassword" name="newPassword" id="newPassword"><br><br>

  <button type="button" (click)="updatePassword()">Modifier</button>
</form>
