<div class="login-wrapper vh-100 d-flex justify-content-center align-items-center">
  <div class="card login-card shadow-lg border-0 overflow-hidden">
    <div class="card-header-custom"></div>
    <div class="card-body p-5">
      <div class="text-center mb-5">
        <div class="logo-circle mb-3">
          <mat-icon class="logo-icon">lock_reset</mat-icon>
        </div>
        <h2 class="fw-bold text-dark mb-1">Réinitialisation</h2>
        <p class="text-muted small">
          @if(step === 1) { Entrez votre email pour recevoir un code. }
          @if(step === 2) { Entrez le code et votre nouveau mot de passe. }
        </p>
      </div>
      @if(step === 1){
      <form (ngSubmit)="sendCode()">
        <div class="mb-4 input-group-custom">
          <div class="input-group">
            <span class="input-group-text bg-light border-0">
              <mat-icon class="text-muted">email</mat-icon>
            </span>
            <input type="email" id="email" name="email" class="form-control bg-light border-0 ps-0"
              placeholder="Adresse email" [(ngModel)]="email">
          </div>
        </div>
        <button type="submit" class="btn btn-primary-custom w-100 py-3 mb-4 fw-bold shadow-sm"
          (keyup.enter)="sendCode()">
          Envoyer le code
        </button>
        <div class="text-center">
          <a class="text-decoration-none text-muted small hover-primary" (click)="login()">
            Retour à la connexion
          </a>
        </div>
      </form>
      }
      @if(step === 2) {
      <form (ngSubmit)="updatePassword()">
        <div class="mb-4 input-group-custom">
          <div class="input-group">
            <span class="input-group-text bg-light border-0">
              <mat-icon class="text-muted">vpn_key</mat-icon>
            </span>
            <input type="text" id="code" name="code" class="form-control bg-light border-0 ps-0"
              placeholder="Code de confirmation" [(ngModel)]="confirmCode">
          </div>
        </div>
        <div class="mb-4 input-group-custom">
          <div class="input-group">
            <span class="input-group-text bg-light border-0">
              <mat-icon class="text-muted">lock</mat-icon>
            </span>
            <input type="password" id="newPassword" name="newPassword" class="form-control bg-light border-0 ps-0"
              placeholder="Nouveau mot de passe" [(ngModel)]="newPassword">
          </div>
        </div>
        <div class="mb-4 input-group-custom">
          <div class="input-group">
            <span class="input-group-text bg-light border-0">
              <mat-icon class="text-muted">lock_outline</mat-icon>
            </span>
            <input type="password" id="confirmPassword" name="confirmPassword"
              class="form-control bg-light border-0 ps-0" placeholder="Confirmer le mot de passe"
              [(ngModel)]="confirmPassword">
          </div>
        </div>

        <button type="submit" class="btn btn-primary-custom w-100 py-3 mb-4 fw-bold shadow-sm"
          (keyup.enter)="updatePassword()">
          Modifier mon mot de passe
        </button>

        <div class="text-center">
          <a (click)="step = 1" class="text-decoration-none text-muted small hover-primary" style="cursor: pointer;">
            Renvoyer le code
          </a>
        </div>
      </form>
      }

    </div>
  </div>
</div>
